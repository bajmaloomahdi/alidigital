<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Digital</title>

<style>

body{
font-family:tahoma;
background:#f4f6f9;
margin:0;
direction:rtl;
}

/* header */

header{
background:#111;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart-btn{
background:#ff9800;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* slider */

.slider-wrapper{
position:relative;
padding:30px;
}

.slider{
overflow:hidden;
}

.slider-track{
display:flex;
flex-wrap:wrap;
gap:20px;
transition:transform .4s;
}

/* product */

.product{
width:calc(33.33% - 14px);
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
text-align:center;
padding:10px;
}

.product img{
width:100%;
height:160px;
object-fit:contain;
}

.title{
margin:8px 0;
font-size:14px;
}

.price{
color:#2e7d32;
font-weight:bold;
}

.add-btn{
margin-top:8px;
background:#0d6efd;
border:none;
color:white;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* arrows */

.arrow{
position:absolute;
top:40%;
background:white;
border:none;
font-size:22px;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.prev{
right:0;
}

.next{
left:0;
}

/* cart */

.cart-panel{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:3px solid #ff9800;
padding:20px;
display:none;
max-height:50vh;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:5px 0;
}

.cart-actions{
margin-top:10px;
display:flex;
gap:10px;
}

.cart-actions button{
flex:1;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.close-btn{
background:#6c757d;
color:white;
}

.clear-btn{
background:#dc3545;
color:white;
}

/* mobile */

@media(max-width:600px){

.slider{
overflow:visible;
}

.slider-track{
transform:none !important;
}

.product{
width:100%;
}

.arrow{
display:none;
}

}

</style>
</head>

<body>

<header>

<div>Ali Land Store</div>

<button class="cart-btn" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</button>

</header>

<div class="slider-wrapper">

<button class="arrow prev" onclick="prevSlide()">›</button>

<div class="slider">

<div class="slider-track" id="track">

<div class="product">
<img src="1.jpg">
<div class="title">هدفون</div>
<div class="price">890000</div>
<button class="add-btn" onclick="addToCart('هدفون',890000)">افزودن</button>
</div>

<div class="product">
<img src="2.JPG">
<div class="title">کیبورد</div>
<div class="price">1200000</div>
<button class="add-btn" onclick="addToCart('کیبورد',1200000)">افزودن</button>
</div>

<div class="product">
<img src="206.JPG">
<div class="title">اسپیکر</div>
<div class="price">780000</div>
<button class="add-btn" onclick="addToCart('اسپیکر',780000)">افزودن</button>
</div>

<div class="product">
<img src="11.JPG">
<div class="title">ماکت ماشین</div>
<div class="price">500000</div>
<button class="add-btn" onclick="addToCart('ماکت',500000)">افزودن</button>
</div>

<div class="product">
<img src="12.JPG">
<div class="title">دسته بازی</div>
<div class="price">320000</div>
<button class="add-btn" onclick="addToCart('دسته',320000)">افزودن</button>
</div>

<div class="product">
<img src="204.JPG">
<div class="title">موبایل</div>
<div class="price">250000</div>
<button class="add-btn" onclick="addToCart('موبایل',250000)">افزودن</button>
</div>

</div>

</div>

<button class="arrow next" onclick="nextSlide()">‹</button>

</div>

<div class="cart-panel" id="cart">

<h3>سبد خرید</h3>

<div id="cart-items"></div>

<div id="cart-total"></div>

<div class="cart-actions">

<button class="close-btn" onclick="toggleCart()">بستن</button>

<button class="clear-btn" onclick="clearCart()">خالی کردن</button>

</div>

</div>

<script>

let cart=[]
let page=0

function toggleCart(){

let c=document.getElementById("cart")

if(c.style.display==="block"){
c.style.display="none"
}else{
c.style.display="block"
}

}

function addToCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

document.getElementById("cart-count").innerText=cart.length

let items=document.getElementById("cart-items")

items.innerHTML=""

let total=0

cart.forEach(i=>{

total+=i.price

items.innerHTML+=`
<div class="cart-item">
<span>${i.name}</span>
<span>${i.price}</span>
</div>
`

})

document.getElementById("cart-total").innerText="جمع: "+total

}

function clearCart(){

cart=[]

updateCart()

}

function nextSlide(){

const track=document.getElementById("track")

const width=document.querySelector(".slider").offsetWidth

page++

track.style.transform="translateX(-"+page*width+"px)"

}

function prevSlide(){

if(page>0){

const track=document.getElementById("track")

const width=document.querySelector(".slider").offsetWidth

page--

track.style.transform="translateX(-"+page*width+"px)"

}

}

</script>

</body>
</html>
