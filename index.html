<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Digital</title>

<style>

body{
font-family:tahoma;
background:#f4f6f9;
margin:0;
direction:rtl;
}

/* header */

header{
background:#111;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart-btn{
background:#ff9800;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* slider */

.slider-wrapper{
position:relative;
padding:30px;
}

.slider{
overflow:hidden;
}

.slider-track{
display:flex;
transition:transform .4s ease;
gap:20px;
}

/* product */

.product{
flex:0 0 calc(20% - 16px);
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
text-align:center;
padding:10px;
}

.product img{
width:100%;
height:150px;
object-fit:contain;
}

.title{
font-size:14px;
margin:8px 0;
}

.price{
color:#2e7d32;
font-weight:bold;
}

.add-btn{
margin-top:8px;
background:#0d6efd;
border:none;
color:white;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* arrows */

.arrow{
position:absolute;
top:45%;
background:white;
border:none;
font-size:22px;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.prev{
right:0;
}

.next{
left:0;
}

/* tablet */

@media(max-width:1000px){

.product{
flex:0 0 calc(33.33% - 14px);
}

}

/* mobile */

@media(max-width:600px){

.product{
flex:0 0 calc(50% - 10px);
}


/* حالت موبایل - بدون اسلایدر */

@media(max-width:600px){

.slider{
overflow:visible;
}

.slider-track{
flex-direction:column;
transform:none !important;
}

.product{
flex:none;
width:100%;
}

.arrow{
display:none;
}

}

}

</style>
</head>

<body>

<header>

<div>Ali Land Store</div>

<button class="cart-btn">
🛒 <span id="cart-count">0</span>
</button>

</header>


<div class="slider-wrapper">

<button class="arrow prev" onclick="prevSlide()">›</button>

<div class="slider">
<div class="slider-track" id="track">

<div class="product">
<img src="1.jpg">
<div class="title">هدفون</div>
<div class="price">890000 تومان</div>
<button class="add-btn" onclick="addToCart()">افزودن</button>
</div>

<div class="product">
<img src="2.JPG">
<div class="title">کیبورد</div>
<div class="price">1200000 تومان</div>
<button class="add-btn" onclick="addToCart()">افزودن</button>
</div>

<div class="product">
<img src="206.JPG">
<div class="title">اسپیکر</div>
<div class="price">780000 تومان</div>
<button class="add-btn" onclick="addToCart()">افزودن</button>
</div>

<div class="product">
<img src="11.JPG">
<div class="title">ماکت ماشین</div>
<div class="price">500000 تومان</div>
<button class="add-btn" onclick="addToCart()">افزودن</button>
</div>

<div class="product">
<img src="12.JPG">
<div class="title">دسته بازی</div>
<div class="price">320000 تومان</div>
<button class="add-btn" onclick="addToCart()">افزودن</button>
</div>

<div class="product">
<img src="204.JPG">
<div class="title">موبایل</div>
<div class="price">250000 تومان</div>
<button class="add-btn" onclick="addToCart()">افزودن</button>
</div>

</div>
</div>

<button class="arrow next" onclick="nextSlide()">‹</button>

</div>


<script>

let index=0

function itemsPerView(){

if(window.innerWidth < 600) return 2
if(window.innerWidth < 1000) return 3
return 5

}

function updateSlider(){

const track=document.getElementById("track")
const itemWidth=track.children[0].offsetWidth+20

track.style.transform=`translateX(${index * itemWidth}px)`

}

function nextSlide(){

const track=document.getElementById("track")
const max=track.children.length-itemsPerView()

if(index < max){
index++
updateSlider()
}

}

function prevSlide(){

if(index>0){
index--
updateSlider()
}

}

window.addEventListener("resize",updateSlider)

function addToCart(){

let count=document.getElementById("cart-count")
count.innerText=parseInt(count.innerText)+1

}

</script>

</body>
</html>
