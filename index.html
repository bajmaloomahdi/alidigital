<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Digital</title>

<link rel="manifest" href="manifest.json">

<style>
body{
font-family:tahoma;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:#111;
color:white;
padding:15px;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
border-radius:8px;
}

button{
margin-top:8px;
padding:8px 12px;
border:none;
background:#0077ff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005ad1;
}
</style>
</head>

<body>

<header>
Ali Land Store
</header>

<div class="grid">

<div class="product"><img src="1.jpg"><button>مشاهده</button></div>
<div class="product"><img src="2.JPG"><button>مشاهده</button></div>
<div class="product"><img src="10.JPG"><button>مشاهده</button></div>
<div class="product"><img src="11.JPG"><button>مشاهده</button></div>
<div class="product"><img src="12.JPG"><button>مشاهده</button></div>
<div class="product"><img src="13.JPG"><button>مشاهده</button></div>
<div class="product"><img src="14.JPG"><button>مشاهده</button></div>
<div class="product"><img src="15.JPG"><button>مشاهده</button></div>
<div class="product"><img src="16.JPG"><button>مشاهده</button></div>

<div class="product"><img src="112.JPG"><button>مشاهده</button></div>
<div class="product"><img src="113.JPG"><button>مشاهده</button></div>

<div class="product"><img src="200.JPG"><button>مشاهده</button></div>
<div class="product"><img src="201.JPG"><button>مشاهده</button></div>
<div class="product"><img src="202.JPG"><button>مشاهده</button></div>
<div class="product"><img src="203.JPG"><button>مشاهده</button></div>

</div>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
