<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>علی دیجیتال | فروشگاه اینترنتی</title>

<meta name="description" content="فروشگاه علی دیجیتال برای خرید آنلاین محصولات دیجیتال و متنوع">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:tahoma;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
font-size:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart{
background:#ff9800;
padding:8px 14px;
border-radius:8px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:8px;
height:180px;
object-fit:cover;
}

.price{
color:#009688;
font-size:18px;
margin-top:8px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
background:#0077ff;
color:white;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#005ad1;
}

</style>
</head>

<body>

<header>
<div>Ali Land Store</div>

<div class="cart">
🛒 سبد خرید:
<span id="cart-count">0</span>
</div>
</header>

<div class="grid">

<div class="product">
<img src="1.jpg">
<div class="price">250,000 تومان</div>
<button onclick="addToCart()">افزودن به سبد خرید</button>
</div>

<div class="product">
<img src="2.JPG">
<div class="price">320,000 تومان</div>
<button onclick="addToCart()">افزودن به سبد خرید</button>
</div>

<div class="product">
<img src="10.JPG">
<div class="price">500,000 تومان</div>
<button onclick="addToCart()">افزودن به سبد خرید</button>
</div>

<div class="product">
<img src="11.JPG">
<div class="price">780,000 تومان</div>
<button onclick="addToCart()">افزودن به سبد خرید</button>
</div>

<div class="product">
<img src="12.JPG">
<div class="price">1,200,000 تومان</div>
<button onclick="addToCart()">افزودن به سبد خرید</button>
</div>

<div class="product">
<img src="13.JPG">
<div class="price">890,000 تومان</div>
<button onclick="addToCart()">افزودن به سبد خرید</button>
</div>

</div>

<script>

let cart = 0;

function addToCart(){
cart++;

document.getElementById("cart-count").innerText = cart;

alert("محصول به سبد خرید اضافه شد");
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
